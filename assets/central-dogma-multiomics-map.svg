    <text x="1216" y="176" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" fill="#334155">Linear projection</text>
    <text x="1216" y="206" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" fill="#334155">MLP and autoencoder</text>
    <text x="1216" y="236" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" fill="#334155">GNN and graph attention</text>
    <text x="1216" y="266" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" fill="#334155">Transformer and cross-attention</text>
    <text x="1216" y="296" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" fill="#334155">Diffusion and GAN</text>
    <text x="1216" y="326" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" fill="#334155">Foundation-scale pretraining</text>
